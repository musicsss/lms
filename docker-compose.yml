services:
  web:
    build: ./web
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

  admin:
    build: ./admin
    ports:
      - "8081:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: ./server
    environment:
      - LMS_DATABASE_HOST=db
      - LMS_DATABASE_PORT=5432
      - LMS_DATABASE_USER=lms
      - LMS_DATABASE_PASSWORD=lms123
      - LMS_DATABASE_DBNAME=lms
      - LMS_DATABASE_SSLMODE=disable
      - LMS_JWT_SECRET=change-me-in-production
      - LMS_STORAGE_ROOT=/data
      - LMS_SERVER_MODE=release
      - LMS_SETUP_ADMIN=admin:admin123
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=lms
      - POSTGRES_PASSWORD=lms123
      - POSTGRES_DB=lms
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
